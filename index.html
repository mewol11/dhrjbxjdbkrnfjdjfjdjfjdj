<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블록코딩 & 개발 로고 퀴즈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #EEF1FB;
      --card: #FFFFFF;
      --ink: #202844;
      --muted: #8992AC;
      --primary: #3654F4;
      --primary-dark: #2440D6;
      --accent: #FFAA33;
      --success: #04C990;
      --danger: #FF5C77;
      --track: #E3E7F7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Gowun Dodum', sans-serif;
      color: var(--ink);
      text-align: center;
      background:
        radial-gradient(circle, #d7deF6 1.5px, transparent 1.5px) 0 0/22px 22px,
        var(--bg);
      padding: 20px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      position: relative;
      background: var(--card);
      padding: 34px 30px 30px;
      border-radius: 22px;
      width: 90%;
      max-width: 550px;
      box-shadow: 0 20px 45px rgba(32, 40, 68, 0.16);
      border: 1px solid #E4E8F7;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-family: 'Jua', sans-serif;
      letter-spacing: 0.14em;
      font-size: 13px;
      color: var(--primary);
      text-transform: uppercase;
    }

    h1#progress {
      font-family: 'Jua', sans-serif;
      font-weight: normal;
      font-size: 24px;
      margin: 0 0 14px;
      color: var(--ink);
    }

    .progress-track {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 6px;
    }

    .progress-track .seg {
      flex: 1;
      max-width: 46px;
      height: 8px;
      border-radius: 5px;
      background: var(--track);
      transition: background 0.3s;
    }

    .progress-track .seg.filled {
      background: var(--primary);
    }

    .progress-track .seg.current {
      background: var(--accent);
    }

    .img-box {
      position: relative;
      width: 100%;
      height: 220px;
      background: #F4F6FD;
      border: 2px dashed #D3D9F2;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      margin: 22px 0;
    }

    .img-box::before {
      content: '';
      position: absolute;
      top: -11px;
      left: 26px;
      width: 26px;
      height: 22px;
      background: var(--card);
      border: 2px dashed #D3D9F2;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
    }

    img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
      display: none;
    }

    #loadingText {
      color: var(--muted);
      font-size: 15px;
      padding: 0 20px;
    }

    #loadingText.error {
      color: var(--danger);
      font-weight: bold;
    }

    .fallback-icon {
      font-size: 50px;
      display: block;
      margin-bottom: 8px;
    }

    #choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .choice-btn {
      position: relative;
      box-sizing: border-box;
      width: calc(50% - 10px);
      margin: 5px;
      padding: 13px 16px 13px 30px;
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 16px;
      border-radius: 10px;
      border: 2px solid #E4E8F7;
      background: var(--card);
      color: var(--ink);
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
      text-align: left;
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.5;
    }

    .choice-btn:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: 0 6px 14px rgba(54, 84, 244, 0.18);
    }

    .choice-btn:hover::before {
      opacity: 1;
    }

    .result {
      font-family: 'Jua', sans-serif;
      font-size: 30px;
      margin-top: 18px;
      min-height: 46px;
    }

    .correct {
      color: var(--success);
      animation: pop 0.5s infinite alternate;
    }

    .wrong {
      color: var(--danger);
      animation: shake 0.3s infinite;
    }

    #nextBtn {
      padding: 13px 32px;
      font-family: 'Jua', sans-serif;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      display: none;
      margin-top: 16px;
      box-shadow: 0 8px 18px rgba(54, 84, 244, 0.3);
      transition: 0.15s;
    }

    #nextBtn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    @keyframes pop {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    @keyframes shake {
      0% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      100% { transform: translateX(-5px); }
    }

    @keyframes flashBg {
      0% { background-color: #74ebd5; }
      25% { background-color: gold; }
      50% { background-color: hotpink; }
      75% { background-color: cyan; }
      100% { background-color: #74ebd5; }
    }
  </style>
</head>
<body>

<div class="container">
  <p class="eyebrow">CODE LOGO QUIZ</p>
  <h1 id="progress">문제 1 / 8</h1>
  <div class="progress-track" id="progressTrack"></div>

  <div id="quiz-content">
    <div class="img-box">
      <img id="quizImage" alt="퀴즈 이미지">
      <p id="loadingText">이미지 로딩 중...</p>
    </div>
    <div id="choices"></div>
  </div>

  <div id="result" class="result"></div>
  <button id="nextBtn" onclick="handleNext()">다음 문제</button>
</div>


<script>
const quizData = [
  {
    answer: '엔트리',
    choices: ['엔트리','스크래치','코드.org','파이썬','로블록스'],
    image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmuZjfu5rRyeNfYXmmHrktmPBEm30cRV-hfTaPjZmv9w&s=10'
  },
  {
    answer: '스크래치',
    choices: ['스크래치','엔트리','마인크래프트','유니티','코드.org'],
    image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUoLl2DMqi7HZWVdmqSno8B3iiyveJrETU1cyOUFQv0g&s=10'
  },
  {
    answer: 'VS코드',
    choices: ['VS코드','금양이','파이참','이클립스','아톰'],
    image: 'https://upload.wikimedia.org/wikipedia/commons/9/9a/Visual_Studio_Code_1.35_icon.svg'
  },
  {
    answer: '파이썬',
    choices: ['파이썬','자바','C++','스크래치','루비'],
    image: 'https://blog.kakaocdn.net/dna/cn9zq6/btsaUkhGHdY/AAAAAAAAAAAAAAAAAAAAAHjjzE3p5XSwHaIJVgOl7eXyKNaOeHrd6f3w4BUehGlj/img.png?credential=yqXZFxpELC7KVnFOS48ylbz2pIh7yKj8&expires=1785509999&allow_ip=&allow_referer=&signature=Dq3JqGD9BK4luFSSY9hlq3xbJKk%3D'
  },
  {
    answer: '마인크래프트',
    choices: ['마인크래프트', '로블록스', '엔트리', '스크래치', '레고 스파이크'],
    image: 'https://file.alphawiki.org/97/9718cbb7a80b4ccda40272eb0b1e2892f0ed0c54dcc00993ea49fa87d8bc6abc.svg'
  },
  {
    answer: '로블록스',
    choices: ['로블록스', '마인크래프트', '유니티', '제페토', '코드.org'],
    image: 'https://file.alphasquare.co.kr/media/images/stock_logo/us/RBLX.png'
  },
  {
    answer: '코드.org',
    choices: ['코드.org', '생활코딩', '스크래치', '엔트리', '앱인벤터'],
    image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Code.org_logo.svg/120px-Code.org_logo.svg.png'
  },
  {
    answer: '정보올림피아드',
    choices: ['정보올림피아드', '스크래치', '자바', '코틀린', '스위프트'],
    image: 'https://i0.wp.com/blog-admin.gguge.com/wp-content/uploads/2023/05/%ED%95%9C%EA%B5%AD%EC%A0%95%EB%B3%B4%EC%98%AC%EB%A6%BC%ED%94%BC%EC%95%84%EB%93%9C_KOI%EB%A1%9C%EA%B3%A0.jpg?resize=317%2C270&ssl=1'
  }
];

let currentIndex = 0;

function shuffleArray(array) {
  return array.sort(() => Math.random() - 0.5);
}

function renderProgressTrack() {
  const track = document.getElementById('progressTrack');
  track.innerHTML = '';
  quizData.forEach((_, i) => {
    const seg = document.createElement('div');
    seg.className = 'seg';
    if (i < currentIndex) seg.classList.add('filled');
    if (i === currentIndex) seg.classList.add('current');
    track.appendChild(seg);
  });
}

function loadQuestion() {
  if(currentIndex >= quizData.length) {
    showFinalResult();
    return;
  }

  const currentQuiz = quizData[currentIndex];
  const img = document.getElementById('quizImage');
  const loading = document.getElementById('loadingText');
  const result = document.getElementById('result');
  const nextBtn = document.getElementById('nextBtn');

  result.textContent = '';
  result.className = 'result';
  nextBtn.style.display = 'none';
  document.body.style.animation = ''; 

  document.getElementById('progress').textContent =
    `문제 ${currentIndex + 1} / ${quizData.length}`;

  renderProgressTrack();

  img.style.display = 'none';
  loading.classList.remove('error');
  loading.textContent = '이미지 로딩 중...';
  loading.style.display = 'block';

  img.src = currentQuiz.image;

  img.onload = () => {
    loading.style.display = 'none';
    img.style.display = 'block';
  };

  img.onerror = () => {
    loading.innerHTML = '<span class="fallback-icon">🖼️</span>이미지를 불러올 수 없습니다.<br>아래 보기 중에서 정답을 골라보세요!';
    loading.classList.add('error');
    loading.style.display = 'block';
    img.style.display = 'none';
  };

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  choicesDiv.style.pointerEvents = 'auto';

  shuffleArray([...currentQuiz.choices]).forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(choice);
    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(userAnswer) {
  const currentQuiz = quizData[currentIndex];
  const result = document.getElementById('result');
  const nextBtn = document.getElementById('nextBtn');

  document.getElementById('choices').style.pointerEvents = 'none';

  if(userAnswer === currentQuiz.answer) {
    result.textContent = '🎆 정답!!! 🎆';
    result.className = 'result correct';

    for(let i=0; i<80; i++) {
      const effect = document.createElement('div');
      effect.textContent = ['🎉','✨','🔥','🌟','💥'][Math.floor(Math.random()*5)];
      effect.style.position = 'fixed';
      effect.style.left = Math.random()*100 + 'vw';
      effect.style.top = Math.random()*100 + 'vh';
      effect.style.fontSize = (Math.random()*30 + 20) + 'px';
      effect.style.zIndex = '9999';
      effect.style.transition = '2s';
      document.body.appendChild(effect);

      setTimeout(() => {
        effect.style.transform = `translateY(${Math.random()*400-200}px) rotate(${Math.random()*720}deg)`;
        effect.style.opacity = '0';
      }, 50);

      setTimeout(() => effect.remove(), 2000);
    }

    document.body.style.animation = 'flashBg 0.3s 5';

    if(currentIndex === quizData.length - 1) {
      nextBtn.textContent = '결과 보기';
    } else {
      nextBtn.textContent = '다음 문제';
    }
    nextBtn.style.display = 'inline-block';

  } else {
    result.textContent = '🤣 이걸 틀리네 🤣';
    result.className = 'result wrong';

    setTimeout(() => {
      document.body.style.animation = ''; 
      currentIndex = 0;
      loadQuestion();
    }, 2000);
  }
}

function handleNext() {
  currentIndex++; 
  loadQuestion();
}

function showFinalResult() {
  document.getElementById('progress').textContent = '🏆 축하합니다! 통과! 🏆';
  document.getElementById('quiz-content').style.display = 'none'; 
  document.querySelectorAll('#progressTrack .seg').forEach(seg => {
    seg.classList.add('filled');
    seg.classList.remove('current');
  });
  
  const result = document.getElementById('result');
  result.textContent = '모든 문제를 맞췄습니다!';
  result.className = 'result correct';

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = '다시하기';
  nextBtn.style.display = 'inline-block';
  nextBtn.onclick = () => {
    document.getElementById('quiz-content').style.display = 'block';
    nextBtn.onclick = handleNext; 
    currentIndex = 0;
    loadQuestion();
  };
}

loadQuestion();
</script>

</body>
  </html>
