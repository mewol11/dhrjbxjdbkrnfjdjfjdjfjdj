<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블록코딩 & 개발 로고 퀴즈</title>

  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      padding: 20px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: rgba(255,255,255,0.9);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 550px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .img-box {
      width: 100%;
      height: 220px;
      background: #f8f8f8;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      margin: 20px 0;
    }

    img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
      display: none;
    }

    .choice-btn {
      width: calc(50% - 10px);
      margin: 5px;
      padding: 12px;
      font-size: 17px;
      border-radius: 10px;
      border: none;
      background: white;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    .choice-btn:hover {
      transform: scale(1.05);
      background: #f0f0f0;
    }

    .result {
      font-size: 35px;
      font-weight: bold;
      margin-top: 20px;
      min-height: 50px;
    }

    .correct {
      color: #00c853;
      animation: pop 0.5s infinite alternate;
    }

    .wrong {
      color: #ff1744;
      animation: shake 0.3s infinite;
    }

    #nextBtn {
      padding: 14px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      display: none;
      margin-top: 20px;
      font-weight: bold;
    }

    @keyframes pop {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    @keyframes shake {
      0% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      100% { transform: translateX(-5px); }
    }

    @keyframes flashBg {
      0% { background: #74ebd5; }
      25% { background: gold; }
      50% { background: hotpink; }
      75% { background: cyan; }
      100% { background: #74ebd5; }
    }

  </style>
</head>

</div>

];
let currentIndex = 0;

function shuffleArray(array) {
  return array.sort(() => Math.random() - 0.5);
}

function loadQuestion() {

  if(currentIndex >= quizData.length) {
    showFinalResult();
    return;
  }

  const currentQuiz = quizData[currentIndex];

  const img = document.getElementById('quizImage');
  const loading = document.getElementById('loadingText');
  const result = document.getElementById('result');
  const nextBtn = document.getElementById('nextBtn');

  result.textContent = '';
  nextBtn.style.display = 'none';

  document.getElementById('progress').textContent =
    `문제 ${currentIndex + 1} / ${quizData.length}`;

  img.style.display = 'none';
  loading.style.display = 'block';

  img.src = currentQuiz.image;

  img.onload = () => {
    loading.style.display = 'none';
    img.style.display = 'block';
  };

  img.onerror = () => {
    loading.textContent = '이미지를 불러올 수 없습니다.';
  };

  const choicesDiv = document.getElementById('choices');

  choicesDiv.innerHTML = '';
  choicesDiv.style.pointerEvents = 'auto';

  shuffleArray([...currentQuiz.choices]).forEach(choice => {

    const btn = document.createElement('button');

    btn.className = 'choice-btn';

    btn.textContent = choice;

    btn.onclick = () => checkAnswer(choice);

    choicesDiv.appendChild(btn);

  });

}

function checkAnswer(userAnswer) {

  const currentQuiz = quizData[currentIndex];

  const result = document.getElementById('result');

  const nextBtn = document.getElementById('nextBtn');

  document.getElementById('choices').style.pointerEvents = 'none';

  if(userAnswer === currentQuiz.answer) {

    result.textContent = '🎆 정답!!! 🎆';

    result.className = 'result correct';

    for(let i=0; i<80; i++) {

      const effect = document.createElement('div');

      effect.textContent =
        ['🎉','✨','🔥','🌟','💥'][Math.floor(Math.random()*5)];

      effect.style.position = 'fixed';

      effect.style.left = Math.random()*100 + 'vw';

      effect.style.top = Math.random()*100 + 'vh';

      effect.style.fontSize =
        (Math.random()*30 + 20) + 'px';

      effect.style.zIndex = '9999';

      effect.style.transition = '2s';

      document.body.appendChild(effect);

      setTimeout(() => {

        effect.style.transform =
          `translateY(${Math.random()*400-200}px)
           rotate(${Math.random()*720}deg)`;

        effect.style.opacity = '0';

      }, 50);

      setTimeout(() => effect.remove(), 2000);

    }

    document.body.style.animation =
      'flashBg 0.3s 5';

    if(currentIndex === quizData.length - 1) {

      nextBtn.textContent = '다시하기';

    } else {

      nextBtn.textContent = '다음 문제';

    }

    nextBtn.style.display = 'inline-block';

  } else {

    result.textContent = '🤣 이걸 틀리네 🤣';

    result.className = 'result wrong';

    setTimeout(() => {

      currentIndex = 0;

      loadQuestion();

    }, 2000);

  }

}

function handleNext() {

  if(currentIndex >= quizData.length - 1) {

    currentIndex = 0;

  } else {

    currentIndex++;

  }

  loadQuestion();

}

function showFinalResult() {

  document.getElementById('progress').textContent =
    '🏆 통과! 🏆';

}

loadQuestion();

</script>
